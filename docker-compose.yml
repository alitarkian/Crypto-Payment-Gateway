networks:
  # Shared network — other projects join this to call the gateway
  crypto_gateway_net:
    name: crypto_gateway_net
    driver: bridge

services:
  # ─── Crypto Payment Gateway App ──────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-payment-gateway:latest
    container_name: crypto_gateway
    restart: unless-stopped
    networks:
      - crypto_gateway_net
    # Allows container to reach host's localhost (where postgres/redis/rabbitmq run)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
